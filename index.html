<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NASA Climate Data</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    .container { max-width: 900px; margin: auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);}
    .table-scroll { overflow-x: auto; max-width: 100vw; }
    table { border-collapse: collapse; min-width: 600px; width: 100%; margin-bottom: 10px;}
    th, td { border: 1px solid #ccc; padding: 6px 10px; text-align: left;}
    th { background: #f4f4f4; }
    pre { background:#f4f4f4;padding:10px;border-radius:6px;max-height:300px;overflow:auto;}
    @media (max-width: 600px) {
      .container { padding: 5px; }
      th, td { padding: 4px 5px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NASA Climate Data</h1>
    <form id="nasaForm">
      <input type="text" name="start" placeholder="Start date (YYYYMMDD)" required>
      <input type="text" name="end" placeholder="End date (YYYYMMDD)" required>
      <input type="text" name="lat" placeholder="Latitude" required>
      <input type="text" name="lon" placeholder="Longitude" required>
      <button type="submit">Get Forecast</button>
    </form>
    <h2>Forecast Table</h2>
    <div class="table-scroll">
      <div id="dynamicTable"></div>
    </div>
    <h2>Raw JSON Output</h2>
    <pre id="jsonOutput"></pre>
  </div>
<script>
let lastPayload = null;

document.getElementById('nasaForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const form = e.target;
  lastPayload = {
    start: form.start.value,
    end: form.end.value,
    lat: form.lat.value,
    lon: form.lon.value
  };
  fetchTable();
});

function fetchTable() {
  if (!lastPayload) return;
  fetch('https://llhtimlam.github.io/NASA-Hackathon/index.html', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(lastPayload)
  })
  .then(response => response.json())
  .then(result => {
    document.getElementById('jsonOutput').textContent = JSON.stringify(result, null, 2);

    // Build dynamic table: parameters as rows, dates as columns
    const table = result.table || [];
    // Get all unique dates from the first parameter's value object
    const dates = table.length > 0 ? Object.keys(Object.values(table[0])[0]) : [];
    let html = '<table><thead><tr><th>Parameter</th>';
    dates.forEach(date => {
      html += `<th>${date}</th>`;
    });
    html += '</tr></thead><tbody>';
    table.forEach(row => {
      // row is {parameter: {date1: value1, date2: value2, ...}}
      const param = Object.keys(row)[0];
      const values = row[param];
      html += `<tr><td>${param}</td>`;
      dates.forEach(date => {
        html += `<td>${values[date] !== undefined ? values[date] : ''}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    document.getElementById('dynamicTable').innerHTML = html;
  })
  .catch((err) => {
    document.getElementById('dynamicTable').innerHTML = "<p>Error fetching data.</p>";
    document.getElementById('jsonOutput').textContent = "Error: " + err;
    console.error("Fetch error:", err);
  });
}
</script>
</body>
</html>
